name: Deploy landing page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate landing page
        run: npm run build:landing

      - name: Prepare Pages artifact
        run: |
          rm -rf .site
          mkdir -p .site
          cp docs/index.html .site/index.html
          cp screenshot-dark.png screenshot-light.png icon.png icon.svg .site/
          sed -i \
            -e 's#\.\./screenshot-dark\.png#./screenshot-dark.png#g' \
            -e 's#\.\./screenshot-light\.png#./screenshot-light.png#g' \
            -e 's#\.\./icon\.png#./icon.png#g' \
            .site/index.html
          touch .site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
