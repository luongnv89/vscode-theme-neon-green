name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Validate theme JSON files
        run: |
          for f in themes/*.json; do
            echo "Validating $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - name: Build generated landing page
        run: npm run build:landing

      - name: Ensure generated landing page is committed
        run: git diff --exit-code -- docs/index.html

      - name: Check trailing whitespace
        run: |
          if grep -rn '[[:blank:]]$' --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' --include='*.html' --include='*.mjs' .; then
            echo "::error::Trailing whitespace found"
            exit 1
          fi

      - name: Check files end with newline
        run: |
          fail=0
          for f in $(find . \( -name '*.json' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.html' -o -name '*.mjs' \) | grep -v node_modules | grep -v .git); do
            if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then
              echo "::error file=$f::Missing newline at end of file"
              fail=1
            fi
          done
          exit $fail

      - name: Check for large files
        run: |
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "::error file=$f::File exceeds 2MB"
            fail=1
          done < <(find . -not -path './.git/*' -not -path './node_modules/*' -not -name '*.vsix' -type f -size +2M)
          exit $fail

  package:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build landing page
        run: npm run build:landing

      - name: Package extension
        run: vsce package --no-git-tag-version --no-update-package-json

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: '*.vsix'
          retention-days: 30
