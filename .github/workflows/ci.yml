name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Validate theme JSON files
        run: |
          for f in themes/*.json; do
            echo "Validating $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      - name: Check trailing whitespace
        run: |
          if grep -rn '[[:blank:]]$' --include='*.json' --include='*.md' --include='*.yml' --include='*.yaml' .; then
            echo "::error::Trailing whitespace found"
            exit 1
          fi

      - name: Check files end with newline
        run: |
          fail=0
          for f in $(find . -name '*.json' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' | grep -v node_modules | grep -v .git); do
            if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then
              echo "::error file=$f::Missing newline at end of file"
              fail=1
            fi
          done
          exit $fail

      - name: Check for large files
        run: |
          find . -not -path './.git/*' -not -name '*.vsix' -type f -size +2M | while read f; do
            echo "::error file=$f::File exceeds 2MB"
            exit 1
          done

  package:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-git-tag-version --no-update-package-json

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: '*.vsix'
          retention-days: 30
