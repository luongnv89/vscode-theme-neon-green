# Hermes Agent — Dark
# cmux companion theme (rendered via Ghostty) for the "Hermes Agent — Dark" VS Code theme.
# Palette: gold-on-midnight — warm cornsilk text on deep navy, with a gold brand accent.
#
# cmux renders terminal colors through Ghostty, so this is a Ghostty theme file.
# Install:
#   mkdir -p ~/.config/ghostty/themes
#   cp themes/cmux/hermes-agent-dark.conf ~/.config/ghostty/themes/"Hermes Agent Dark"
# then add `theme = Hermes Agent Dark` to ~/.config/ghostty/config and reload cmux terminals.

# Deep midnight navy canvas with warm cornsilk foreground.
background = #0b0b16
foreground = #FFF8DC

# Gold brand accent — cursor, with cornsilk text drawn over it.
cursor-color = #FFD700
cursor-text = #0b0b16

# Subtle navy selection, cornsilk selected text.
selection-background = #1e1e35
selection-foreground = #FFF8DC

# Normal colors (0-7)
palette = 0=#1a1a2e
palette = 1=#EF5350
palette = 2=#4CAF50
palette = 3=#FFD700
palette = 4=#B28DFF
palette = 5=#DAA520
palette = 6=#6ED7D2
palette = 7=#FFF8DC

# Bright colors (8-15)
palette = 8=#3a3a5e
palette = 9=#f07c7a
palette = 10=#72c072
palette = 11=#ffe44d
palette = 12=#c7adff
palette = 13=#e8c040
palette = 14=#92e2de
palette = 15=#FFFFFF
