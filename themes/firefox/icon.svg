<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA726"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="48" cy="48" r="46" fill="#0b0b16" stroke="#1e1e35" stroke-width="2"/>

  <!-- Inner ring -->
  <circle cx="48" cy="48" r="40" fill="none" stroke="#151525" stroke-width="1"/>

  <!-- Hermes winged caduceus-inspired symbol -->
  <g filter="url(#glow)" transform="translate(48,48)">
    <!-- Center staff -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

    <!-- Left wing -->
    <path d="M0,-18 Q-16,-30 -24,-22 Q-18,-20 -12,-16 Q-8,-14 0,-18" fill="url(#gold)" opacity="0.9"/>
    <path d="M0,-12 Q-14,-22 -20,-14 Q-16,-12 -10,-10 Q-6,-8 0,-12" fill="url(#gold)" opacity="0.7"/>

    <!-- Right wing -->
    <path d="M0,-18 Q16,-30 24,-22 Q18,-20 12,-16 Q8,-14 0,-18" fill="url(#gold)" opacity="0.9"/>
    <path d="M0,-12 Q14,-22 20,-14 Q16,-12 10,-10 Q6,-8 0,-12" fill="url(#gold)" opacity="0.7"/>

    <!-- Left snake -->
    <path d="M0,8 Q-12,0 -8,-8 Q-4,-14 0,-8 Q4,-2 0,4 Q-4,10 0,16" fill="none" stroke="#B28DFF" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Right snake -->
    <path d="M0,8 Q12,0 8,-8 Q4,-14 0,-8 Q-4,-2 0,4 Q4,10 0,16" fill="none" stroke="#6ED7D2" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Wing top ornament -->
    <circle cx="0" cy="-30" r="3" fill="#FFD700"/>

    <!-- Snake heads -->
    <circle cx="-8" cy="-8" r="2" fill="#B28DFF"/>
    <circle cx="8" cy="-8" r="2" fill="#6ED7D2"/>
  </g>

  <!-- Subtle corner accents -->
  <circle cx="12" cy="12" r="1.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="84" cy="12" r="1.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="12" cy="84" r="1.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="84" cy="84" r="1.5" fill="#FFD700" opacity="0.3"/>
</svg>
